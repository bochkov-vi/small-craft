<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:extend>
    <div class="container">
        <div class="card border-primary">
            <div class="card-header bg-primary text-light">
                <wicket:message key="filter"/>
            </div>
            <div class="card-body">
                <form wicket:id="form">
                    <div class="form-group">
                        <label class="form-check">
                            <input wicket:id="boat-onexit" type="checkbox" class="form-check-input">
                            <span class="form-check-label"><wicket:message key="boat-on-exit"/></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-outline-primary">
                            <span class="fa fa-filter"></span>
                            <span><wicket:message key="do-filter"/></span>
                        </button>

                        <button wicket:id="clear-filter" type="submit" class="btn btn-outline-secondary">
                            <span class="fa fa-close"></span>
                            <span><wicket:message key="clear-filter"/></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</wicket:extend>
</body>
</html>
