<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <div class="form-group col-md-6">
        <label wicket:for="id.year">
            <wicket:message key="year"/>
        </label>
        <input wicket:id="id.year" type="number" class="form-control">
    </div>
    <div class="form-group col-md-6">
        <label wicket:for="id.number">
            <wicket:message key="number"/>
        </label>
        <input wicket:id="id.number" type="number" readonly class="form-control" >
    </div>
</wicket:panel>
</body>
</html>
