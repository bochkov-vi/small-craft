<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <input wicket:id="id" type="hidden">
    <div class="form-row">
        <div class="form-group col-md-2">
            <label wicket:for="exitCallDateTime">
                <wicket:message key="exitCallDateTime"/>
            </label>
            <input wicket:id="exitCallDateTime" class="form-control">
        </div>
        <div class="form-group col-md-2">
            <label wicket:for="exitDateTime">
                <wicket:message key="exitDateTime"/>
            </label>
            <input wicket:id="exitDateTime" class="form-control">
        </div>
        <div class="form-group col-md-4">
            <label wicket:for="region">
                <wicket:message key="region"/>
            </label>
            <select wicket:id="pier" class="form-control"></select>
        </div>
        <div class="form-group col-md-4">
            <label wicket:for="unit">
                <wicket:message key="unit"/>
            </label>
            <select wicket:id="unit" class="form-control" required></select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group col-md-2">
            <label wicket:for="returnCallDateTime">
                <wicket:message key="returnCallDateTime"/>
            </label>
            <input wicket:id="returnCallDateTime" class="form-control">
        </div>
        <div class="form-group col-md-2">
            <label wicket:for="returnDateTime">
                <wicket:message key="returnDateTime"/>
            </label>
            <input wicket:id="returnDateTime" class="form-control">
        </div>
        <div class="form-group col-md-8">
            <label wicket:for="region">
                <wicket:message key="region"/>
            </label>
            <select wicket:id="region" class="form-control"></select>
        </div>
    </div>
    <div class="card border-success">
        <div class="card-header bg-success">
            <label wicket:for="boat">
                <wicket:message key="boat"/>
            </label>
        </div>

        <div class="card-body" wicket:id="boat"></div>
    </div>
    <div class="card border-info mt-3">
        <div class="card-header bg-info">
            <label wicket:for="captain">
                <wicket:message key="captain"/>
            </label>
        </div>
        <div wicket:id="btn-captain-eq-owner" class="btn btn-outline-primary">
            <span class="fa fa-plus"></span>
            <span wicket:id="btn-captain-eq-owner-label">[btn-captain-eq-owner-label]</span>
        </div>
        <div class="card-body " wicket:id="captain"></div>
    </div>

</wicket:panel>
</body>
</html>
