<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="utf-8"/>
    <title>Spring Boot - Apache Wicket Quickstart</title>

</head>
<body>
<wicket:extend>
    <div class="d-flex justify-content-center">

        <div class="card border-primary">
            <div class="card-header bg-primary">
                <wicket:message key="login.label">login</wicket:message>
            </div>
            <div class="card-body">
                <form wicket:id="loginForm">
                    <div wicket:id="feedback"></div>

                    <div class="form-group">
                        <label>
                            <wicket:message key="username"/>
                        </label>
                        <input type="text" wicket:id="username" class="form-control"/>
                    </div>


                    <div class="form-group">
                        <label>
                            <wicket:message key="password"/>
                        </label>
                        <input type="password" wicket:id="password" class="form-control"/>
                    </div>
                    <div class="form-group">
                        <label>
                            <input wicket:id="rememberme" type="checkbox">
                            <wicket:message key="remember-me"/>
                        </label></div>
                    <button type="submit" class="btn btn-outline-primary">
                        <wicket:message key="signin"/>
                    </button>
                </form>
            </div>
        </div>

    </div>
</wicket:extend>
</body>
</html>
