<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <input wicket:id="id" type="hidden">
    <div class="form-row">
        <div class="col-md-2">
            <div class="form-group">
                <label wicket:for="year">
                    <wicket:message key="year"/>
                </label>
                <input wicket:id="year" class="form-control">
            </div>
        </div>
        <div class="col-md-2">
            <div class="form-group">
                <label wicket:for="number">
                    <wicket:message key="number"/>
                </label>
                <input wicket:id="number" class="form-control">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group">
                <label wicket:for="date">
                    <wicket:message key="date"/>
                </label>
                <input wicket:id="date" class="form-control">
            </div>
        </div>
        <div class="form-group col-md-4">
            <label wicket:for="unit">
                <wicket:message key="unit"/>
            </label>
            <select wicket:id="unit" class="form-control" required></select>
        </div>
    </div>


    <div class="form-row">
        <div class="form-group col-md-2">
            <label wicket:for="dateFrom">
                <wicket:message key="dateFrom"/>
            </label>
            <input wicket:id="dateFrom" class="form-control">
        </div>
        <div class="form-group col-md-2">
            <label wicket:for="dateTo">
                <wicket:message key="dateTo"/>
            </label>
            <input wicket:id="dateTo" class="form-control">
        </div>
        <div class="form-group col-md-8">
            <label wicket:for="region">
                <wicket:message key="region"/>
            </label>
            <select wicket:id="region" class="form-control"></select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group col-md-4">
            <label wicket:for="activity">
                <wicket:message key="activity"/>
            </label>
            <select wicket:id="activity" class="form-control"></select>
        </div>
        <div class="form-group col-md-4">
            <label wicket:for="timeOfDay">
                <wicket:message key="timeOfDay"/>
            </label>
            <select wicket:id="timeOfDay" class="form-control"></select>
        </div>
        <div class="col-md-4">
            <label class="custom-checkbox">
                <input wicket:id="tck" type="checkbox">
                <span>
                    <wicket:message key="tck"/>
                </span>
            </label>
        </div>
    </div>
    <div class="card border-success">
        <div class="card-header bg-success">
            <label wicket:for="boat">
                <wicket:message key="boat"/>
            </label>
        </div>

        <div class="card-body" wicket:id="boat"></div>
    </div>

    <div class="card border-info mt-3">
        <div class="card-header bg-info">
            <label wicket:for="captain">
                <wicket:message key="captain"/>
            </label>
        </div>
        <div wicket:id="btn-captain-eq-owner" class="btn btn-outline-primary">
            <span class="fa fa-plus"></span>
            <span wicket:id="btn-captain-eq-owner-label">Это юридическое лицо</span>
        </div>
        <div class="card-body " wicket:id="captain"></div>
    </div>

    <div class="form-row">
        <div class="form-group d-none">
            <label wicket:for="legalPerson">
                <wicket:message key="legalPerson"/>
            </label>
            <div class="input-group">
                <div wicket:id="legalPerson"></div>
            </div>
        </div>
    </div>
</wicket:panel>
</body>
</html>
