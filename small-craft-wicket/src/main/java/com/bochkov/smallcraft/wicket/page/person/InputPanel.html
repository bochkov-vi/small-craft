<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <form wicket:id="form">


        <div class="form-group">
            <label wicket:for="firstName">
                <wicket:message key="firstName"/>
            </label>
            <input wicket:id="firstName" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="middleName">
                <wicket:message key="middleName"/>
            </label>
            <input wicket:id="middleName" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="lastName">
                <wicket:message key="lastName"/>
            </label>
            <input wicket:id="lastName" type="text" class="form-control">
        </div>

        <div class="form-row">
            <div class="form-group col-md-4">
                <label wicket:for="passport.serial">
                    <wicket:message key="passport.serial"/>
                </label>
                <input wicket:id="passport.serial" type="text" class="form-control" maxlength="4">
            </div>
            <div class="form-group col-md-6">
                <label wicket:for="passport.number">
                    <wicket:message key="passport.number"/>
                </label>
                <input wicket:id="passport.number" type="text" class="form-control" maxlength="6">
            </div>
            <div class="form-group col-md-2">
                <label wicket:for="passport.date">
                    <wicket:message key="passport.date"/>
                </label>
                <input wicket:id="passport.date" type="text" class="form-control">
            </div>

        </div>
        <div class="form-group">
            <label wicket:for="passport.data">
                <wicket:message key="passport.data"/>
            </label>
            <input wicket:id="passport.data" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="phone">
                <wicket:message key="phone"/>
            </label>
            <input wicket:id="phone" type="tel" class="form-control" pattern="\+7[ -]*\([0-9]{3}\)[- ]*[0-9]{3}[- ][0-9]{2}[- ]*[0-9]{2}">
        </div>
        <div class="form-group">
            <label wicket:for="email">
                <wicket:message key="email"/>
            </label>
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text">@</span>
                </div>
                <input wicket:id="email" type="email" class="form-control"></div>
        </div>
        <div class="form-group">
            <label wicket:for="address">
                <wicket:message key="address"/>
            </label>
            <textarea wicket:id="address" type="text" class="form-control">
            </textarea>
        </div>
    </form>
</wicket:panel>
</body>
</html>
