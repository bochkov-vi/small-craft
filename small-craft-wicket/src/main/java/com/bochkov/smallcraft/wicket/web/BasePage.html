<?xml version="1.0" encoding="UTF-8"?>

<wicket:head>

        </button>
        <div id="navbarSupportedContent" class="collapse navbar-collapse">
            <div class="navbar-nav ">
                <a wicket:id="home-link" href="#" class="nav-item nav-link ">
                    <i class="fa fa-home"/>
                    <wicket:message key="home-page-title"/>

                    <i class="fa fa-ship"/>
                    <wicket:message key="boat-page-title"/>

                    <div wicket:id="btn-signin" class="nav-link">

                            <wicket:message key="signin"/>
                        </span>
                        <span class="fa fa-sign-in"></span>
