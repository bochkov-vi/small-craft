<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <form wicket:id="form">
        <div class="form-group">
            <label wicket:for="id">
                <wicket:message key="id"/>
            </label>
            <input wicket:id="id" type="text" readonly class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="tailNumber">
                <wicket:message key="tailNumber"/>
            </label>
            <input wicket:id="tailNumber" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="id">
                <wicket:message key="model"/>
            </label>
            <input wicket:id="model" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="id">
                <wicket:message key="type"/>
            </label>
            <input wicket:id="type" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="own">
                <wicket:message key="own"/>
            </label>
            <div class="input-group">
                <select wicket:id="own" class="form-control"></select>
                <div class="input-group-append">
                    <div wicket:id="btn-add-own" class="btn btn-outline-info">
                        <span class="fa fa-plus"/>
                    </div>
                </div>
            </div>
        </div>
    </form>
</wicket:panel>
</body>
</html>
