<?xml version="1.0" encoding="UTF-8"?>

<body>
<wicket:panel>

        <div class="form-group">
            <label wicket:for="id">

            </label>
            <input wicket:id="id" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="id">
                <wicket:message key="model"/>
            </label>
            <input wicket:id="model" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="id">
                <wicket:message key="type"/>
            </label>
            <input wicket:id="type" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="own">
                <wicket:message key="own"/>
            </label>
            <select wicket:id="own" class="form-control"></select>
        </div>
    </form>
</wicket:panel>
</body>
</html>
