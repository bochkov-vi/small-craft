<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:extend>
    <div wicket:id="filter" class="container">
        <div class="form-row">
            <div class="form-group col-sm-4">
                <label wicket:for="dateFrom">
                    <wicket:message key="dateFrom"/>
                </label>
                <input type="text" wicket:id="dateFrom">
            </div>
            <div class="form-group col-sm-4">
                <label wicket:for="dateTo">
                    <wicket:message key="dateTo"/>
                </label>
                <input type="text" wicket:id="dateTo">
            </div>
            <div class="form-group col-sm-4">
                <div class="custom-control custom-checkbox">
                    <input wicket:id="onExitOnly" type="checkbox" class="custom-control-input">
                    <label wicket:for="onExitOnly" class="custom-control-label">
                        <wicket:message key="boat-on-exit"/>
                    </label>
                </div>
            </div>
        </div>
    </div>
    <script>
        $(function () {
            $('[data-toggle="tooltip"]').tooltip()
        })
    </script>
    <wicket:fragment wicket:id="badge-new">
        <span class="badge badge-primary">new</span>
    </wicket:fragment>
</wicket:extend>
</body>
</html>
