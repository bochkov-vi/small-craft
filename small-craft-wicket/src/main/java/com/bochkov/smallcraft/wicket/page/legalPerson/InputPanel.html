<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <form wicket:id="form">

        <div class="form-group">
            <label wicket:for="id">
                <wicket:message key="id"/>
            </label>
            <input wicket:id="id" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="name">
                <wicket:message key="name"/>
            </label>
            <input wicket:id="name" type="text" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="inn">
                <wicket:message key="inn"/>
            </label>
            <input wicket:id="inn" type="text" pattern="[0-9]{10,12}" class="form-control">
        </div>
        <div class="form-group">
            <label wicket:for="address">
                <wicket:message key="address"/>
            </label>
            <textarea wicket:id="address" type="text" class="form-control">
            </textarea>
        </div>
        <div class="form-group">
            <label wicket:for="person">
                <wicket:message key="person"/>
            </label>
            <div class="input-group">
                <select wicket:id="person" class="form-control"></select>
                <span wicket:id="btn-add-person" class="input-group-append">
                    <div class="btn btn-outline-info">
                        <span class="fa fa-plus"/>
                    </div>
                </span>
            </div>
        </div>
    </form>
</wicket:panel>
</body>
</html>
