
spring.datasource.password=smallcraft
spring.datasource.username=smallcraft
spring.datasource.url=jdbc:postgresql://192.168.30.10:5432/smallcraft?ApplicationName=JavaSmallCraftWeb
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
wicket.core.settings.general.configuration-type=development
wicket.core.settings.requestcycle.gather-extended-browser-info=true

server.servlet.context-path=/small-craft
wicket.external.webjars.enabled=true
wicket.verifier.dependencies.enabled=false
spring.main.allow-bean-definition-overriding=true
logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jackson.serialization.write_dates_as_timestamps=false 








